<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Ghar</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }

    .footer {
      background-color: #1e1e1e;
      color: #f2f2f2;
      position: sticky;
      padding: 50px 30px;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.4px;
    }

    .footer h3 {
      margin-bottom: 15px;
      font-size: 2rem;
      font-weight: bold;
      color: #ffffff;
    }

    .footer p {
      margin: 10px 0;
      font-size: 1.15rem;
      color: #dddddd;
    }

    .footer-nav {
      margin: 30px 0 20px;
    }

    .footer-nav a {
      color: #bbbbbb;
      margin: 0 15px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .footer-nav a:hover {
      text-decoration: underline;
      color: #ffffff;
    }

    .footer-contact p {
      margin: 8px 0;
      font-size: 1.1rem;
    }

    .footer-bottom {
      margin-top: 30px;
      border-top: 1px solid #444;
      padding-top: 15px;
      font-size: 1rem;
      color: #aaaaaa;
    }

    @media (max-width: 600px) {
      .footer-nav a {
        display: block;
        margin: 8px 0;
      }
    }
  </style>
</head>
<body>

  <!-- Footer -->
  <footer class="footer">
    <h3>GadgetGhar</h3>
    <p><strong>Your one-stop shop</strong> for the latest electronics and gadgets.</p>

    <div class="footer-nav">
      <a href="\">Home</a>
      <a href="\aboutus">About Us</a>
      <a href="\contactus">Contact Us</a>
      <a href="#">Privacy Policy</a>
      <a href="#">FAQ</a>
    </div>

    <div class="footer-contact">
      <p><strong>Email:</strong> support@gadgetghar.com</p>
      <p><strong>Phone:</strong> +977-9810876675</p>
    </div>

    <div class="footer-bottom">
      <p>&copy; 2025 <strong>GadgetGhar</strong>. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
